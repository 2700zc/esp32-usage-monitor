[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 115200

board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_build.partitions = ota_8mb.csv
; OTA upload (when ESP32 is on WiFi):
;   pio run -t upload --upload-port <ESP32_IP>
board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DXPOWERS_CHIP_AXP2101
    -DU8G2_USE_LARGE_FONTS
    -DBOARD_WAVESHARE_ESP32S3_TOUCH_AMOLED_2_16
    -DCFG_TUSB_MCU=OPT_MCU_ESP32S3
    -DCFG_TUD_ENABLED=1
    -DCONFIG_ESP_WEBSOCKET_CLIENT


lib_deps =
    moononournation/GFX Library for Arduino
    lewisxhe/XPowersLib
    lewisxhe/SensorLib
    adafruit/Adafruit BusIO
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35


[env:esp32-usage-monitor]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.arduino.usb_stack = TINYUSB
